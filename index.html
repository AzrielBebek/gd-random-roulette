<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>GD Roulette</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="top">

<h1>Geometry Dash Random Roulette</h1>

<div class="skipBox">
Skips left: <span id="skipCount">5</span>
</div>

</div>

<div class="card">

<img id="icon">

<div class="info">

<h2 id="levelName">Press Roll</h2>

<p id="creator"></p>

<p>ID: <span id="levelID">00000000</span></p>

<button onclick="roll()">ROLL</button>
<button onclick="copyID()">Copy ID</button>

<input id="percent" placeholder="At least %">

<div class="buttons">

<button onclick="done()" class="done">Done</button>
<button onclick="skip()" class="skip">Skip</button>

</div>

</div>

</div>

<h3>History</h3>

<ul id="history"></ul>

<script src="script.js"></script>

</body>

</html>
